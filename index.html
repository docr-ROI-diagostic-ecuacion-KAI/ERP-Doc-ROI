<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocROI Academic Control Center</title>
    <meta name="description" content="Centro privado DocROI para controlar programas, sesiones, documentos, evaluaciones, finanzas, contactos y alertas docentes." />
    <link rel="icon" type="image/png" href="https://docroi.marketing/wp-content/uploads/2026/07/1b4b0df9-dfd6-4c1f-ba7f-235d2bf88de2.png" />
    <link rel="apple-touch-icon" href="https://docroi.marketing/wp-content/uploads/2026/07/1b4b0df9-dfd6-4c1f-ba7f-235d2bf88de2.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260710-push-3" />
    <style>
      .brand-logo{width:58px;height:42px;object-fit:contain;border:1px solid rgba(135,240,255,.24);border-radius:8px;background:#fff}.institution-logo{display:grid;place-items:center;width:72px;height:72px;margin-top:16px;border:1px solid rgba(170,198,231,.28);border-radius:8px;background:rgba(255,255,255,.08);color:#87f0ff;font-weight:900;object-fit:contain}.institution-logo.placeholder{background:rgba(81,183,255,.1)}.insight-grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(280px,.65fr);gap:16px}.chart-card{display:grid;gap:14px;padding:18px;border:1px solid rgba(170,198,231,.16);border-radius:8px;background:linear-gradient(180deg,rgba(16,24,39,.94),rgba(11,17,29,.94));box-shadow:0 20px 60px rgba(0,0,0,.34)}.chart-card h3{margin:0 0 4px}.chart-row{display:grid;grid-template-columns:minmax(140px,1fr) minmax(120px,1.4fr) minmax(74px,auto);gap:12px;align-items:center}.chart-row.compact{grid-template-columns:minmax(90px,.8fr) minmax(120px,1.4fr) 32px}.chart-row span{overflow:hidden;color:#9eafc5;font-size:.82rem;font-weight:850;text-overflow:ellipsis;white-space:nowrap}.chart-row div{height:12px;overflow:hidden;border-radius:999px;background:rgba(255,255,255,.08)}.chart-row i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,#0d5f93,#87f0ff)}.chart-row strong{color:#d9e9f8;font-size:.86rem;text-align:right}@media(max-width:860px){.insight-grid{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Navegacion principal">
        <a class="brand" href="#dashboard" data-route="dashboard" aria-label="DocROI Academic Control Center">
          <img class="brand-logo" src="https://docroi.marketing/wp-content/uploads/2026/05/Logo_Negro_DoC_ROI.jpg" alt="DocROI" />
          <span><strong>DocROI</strong><small>Academic Control Center</small></span>
        </a>
        <nav id="mainNav"></nav>
        <div class="privacy-box"><span>Acceso privado</span><strong>Modo local</strong><small>Datos guardados en este navegador. Estructura preparada para autenticacion futura.</small></div>
      </aside>
      <div class="main-shell">
        <header class="topbar">
          <button class="icon-btn menu-toggle" id="menuToggle" type="button" aria-label="Abrir menu">Menu</button>
          <div><p class="eyebrow">Sistema operativo docente personal</p><h1 id="pageTitle">Dashboard</h1></div>
          <div class="top-actions"><input id="globalSearch" type="search" placeholder="Buscar institucion, programa, documento..." /><button class="btn ghost" id="resetSeed" type="button">Restablecer demo</button></div>
        </header>
        <main id="app" tabindex="-1"></main>
      </div>
    </div>
    <dialog id="recordDialog"><form method="dialog" class="dialog-card" id="recordForm"><div class="dialog-head"><div><p class="eyebrow" id="dialogKicker">Ficha</p><h2 id="dialogTitle">Nuevo registro</h2></div><button class="icon-btn" value="cancel" aria-label="Cerrar">x</button></div><div id="formFields" class="form-grid"></div><div class="dialog-actions"><button class="btn danger" id="deleteRecord" type="button">Eliminar</button><button class="btn secondary" value="cancel" type="button" id="cancelDialog">Cancelar</button><button class="btn primary" value="default" type="submit">Guardar</button></div></form></dialog>
    <dialog id="detailDialog"><div class="dialog-card detail-dialog"><div class="dialog-head"><div><p class="eyebrow" id="detailKicker">Detalle</p><h2 id="detailTitle">Ficha</h2></div><button class="icon-btn" id="closeDetail" type="button" aria-label="Cerrar">x</button></div><div id="detailContent"></div></div></dialog>
    <script src="app.js?v=20260710-push-3"></script>
  </body>
</html>
