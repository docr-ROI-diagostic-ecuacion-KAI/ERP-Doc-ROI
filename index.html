    <style>
      .brand-logo{width:152px;height:54px;object-fit:contain;border:0;border-radius:0;background:transparent;filter:none;opacity:1}.brand{display:grid;gap:8px;align-items:start}.brand span{min-width:0}.brand strong{display:none}.brand small{font-size:.92rem;line-height:1.15}.institution-logo{display:grid;place-items:center;width:72px;height:72px;margin-top:16px;border:1px solid rgba(170,198,231,.28);border-radius:8px;background:rgba(255,255,255,.08);color:#87f0ff;font-weight:900;object-fit:contain}.institution-logo.placeholder{background:rgba(81,183,255,.1)}.institution-logo.inherited-logo{width:58px;height:58px;margin:10px 0 4px}.detail-identity{display:flex;align-items:center;gap:14px;margin:0 0 16px}.detail-identity .institution-logo{margin:0}.insight-grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(280px,.65fr);gap:16px}.chart-card{display:grid;gap:14px;padding:18px;border:1px solid rgba(170,198,231,.16);border-radius:8px;background:linear-gradient(180deg,rgba(16,24,39,.94),rgba(11,17,29,.94));box-shadow:0 20px 60px rgba(0,0,0,.34)}.chart-card h3{margin:0 0 4px}.chart-row{display:grid;grid-template-columns:minmax(140px,1fr) minmax(120px,1.4fr) minmax(74px,auto);gap:12px;align-items:center}.chart-row.compact{grid-template-columns:minmax(90px,.8fr) minmax(120px,1.4fr) 32px}.chart-row span{overflow:hidden;color:#9eafc5;font-size:.82rem;font-weight:850;text-overflow:ellipsis;white-space:nowrap}.chart-row div{height:12px;overflow:hidden;border-radius:999px;background:rgba(255,255,255,.08)}.chart-row i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,#0d5f93,#87f0ff)}.chart-row strong{color:#d9e9f8;font-size:.86rem;text-align:right}.calendar-planner{display:grid;gap:16px;margin:0 0 22px}.planner-head{display:flex;align-items:end;justify-content:space-between;gap:16px;padding:18px;border:1px solid rgba(170,198,231,.16);border-radius:8px;background:rgba(11,17,29,.72)}.planner-head h3,.month-list h3{margin:0;color:#eef5ff}.planner-head span{color:#87f0ff;font-weight:900}.week-grid{display:grid;grid-template-columns:repeat(7,minmax(150px,1fr));gap:10px}.calendar-day{display:grid;align-content:start;gap:10px;min-height:180px;padding:12px;border:1px solid rgba(170,198,231,.16);border-radius:8px;background:rgba(16,24,39,.82)}.calendar-day>div{display:flex;align-items:center;justify-content:space-between;gap:8px}.calendar-day strong{font-size:.85rem}.calendar-day span,.empty-day{color:#9eafc5;font-size:.78rem;font-weight:750}.calendar-chip,.month-row{width:100%;border:1px solid rgba(135,240,255,.2);border-radius:8px;background:rgba(13,95,147,.16);color:#eef5ff;text-align:left;cursor:pointer}.calendar-chip{display:grid;gap:4px;padding:9px}.calendar-chip strong{font-size:.78rem;line-height:1.25}.calendar-chip span{font-size:.72rem;line-height:1.25}.month-list{display:grid;gap:10px;padding:16px;border:1px solid rgba(170,198,231,.16);border-radius:8px;background:rgba(11,17,29,.72)}.month-row{display:grid;grid-template-columns:160px minmax(0,1fr) 110px;gap:10px;align-items:center;padding:10px 12px}.month-row span,.month-row em{color:#9eafc5;font-size:.82rem;font-style:normal}.month-row strong{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}@media(max-width:1100px){.week-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:860px){.insight-grid{grid-template-columns:1fr}.planner-head,.month-row{display:grid}.week-grid{grid-template-columns:1fr}.month-row{grid-template-columns:1fr}.brand-logo{width:136px;height:48px}}
    </style>
